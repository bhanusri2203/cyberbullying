<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<title>Create Account | AI Moderation System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(270deg,#141e30,#243b55,#141e30);
background-size:600% 600%;

animation:gradient 10s ease infinite;

}

@keyframes gradient{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

.container{

width:420px;
padding:40px;

border-radius:16px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);

box-shadow:0 0 40px rgba(0,0,0,0.5);

text-align:center;
color:white;

}

.logo{

font-size:42px;
margin-bottom:10px;

}

h2{

margin-bottom:5px;
font-size:26px;

}

.subtitle{

color:#bbb;
font-size:14px;
margin-bottom:25px;

}

input{

width:100%;
padding:12px;

margin:10px 0;

border:none;
border-radius:8px;

background:#111;
color:white;

font-size:14px;

outline:none;

transition:0.3s;

}

input:focus{

box-shadow:0 0 10px #00ffff;

}

button{

width:100%;
padding:12px;

margin-top:15px;

border:none;
border-radius:8px;

font-weight:bold;

background:linear-gradient(90deg,#00ffff,#00ff99);

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.05);
box-shadow:0 0 15px #00ffff;

}

.error{

color:#ff4d4d;
margin-top:10px;

}

.login{

margin-top:20px;
font-size:14px;

}

.login a{

color:#00ffff;
text-decoration:none;
font-weight:bold;

}

.login a:hover{

text-decoration:underline;

}

.footer{

margin-top:20px;
font-size:12px;
color:#aaa;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">🛡️</div>

<h2>Create Account</h2>

<p class="subtitle">
Join the AI Cyberbullying Moderation Platform
</p>

<form method="POST">

<input
type="text"
name="username"
placeholder="Enter Username"
required

>

<input
type="password"
name="password"
placeholder="Enter Password"
required

>

<button type="submit">
Create Account 🚀
</button>

</form>

{% if error %}

<p class="error">{{error}}</p>

{% endif %}

<div class="login">

Already have an account?

<a href="/login">Login Here</a>

</div>

<div class="footer">

AI Moderation Platform • Cyberbullying Detection System

</div>

</div>

</body>
</html>
