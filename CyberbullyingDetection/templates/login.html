<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyberbullying Detection - Admin Login</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(270deg,#141e30,#243b55,#141e30);
    background-size:600% 600%;
    animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.login-container{

    width:380px;
    padding:40px;
    border-radius:15px;

    backdrop-filter:blur(15px);
    background:rgba(241, 239, 239, 0.192);

    box-shadow:0 0 40px rgba(0,255,255,0.2);

    text-align:center;
}

.title{

    font-size:24px;
    color:#fff;
    margin-bottom:10px;
}

.subtitle{
    color:#bbb;
    margin-bottom:25px;
    font-size:14px;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    outline:none;
    border-radius:8px;
    background:#111;
    color:white;
    font-size:14px;
    transition:0.3s;
}

.input-box:focus{
    box-shadow:0 0 10px #00ffff;
}

.login-btn{

    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#00ffff,#00ff88);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00ffff;
}

.error{
    color:#ff4c4c;
    margin-top:10px;
}

.logo{
    font-size:40px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="login-container">

<div class="logo">🛡️</div>

<div class="title">
Cyberbullying Detection System
</div>

<div class="subtitle">
AI Moderation Admin Panel
</div>

<form method="POST">

<input class="input-box"
type="text"
name="username"
placeholder="Username"
required>

<input class="input-box"
type="password"
name="password"
placeholder="Password"
required>

<button class="login-btn">
Login
</button>

</form>
<p class="create-account" style="color:white;">
Don't have an account? <a href="/register" style="color:white; text-decoration:none; font-weight:bold;">Create Account</a>
</p>


{% if error %}
<p class="error">{{error}}</p>
{% endif %}

</div>

</body>
</html>
